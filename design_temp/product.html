<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product · Uni-Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.product-page {
  padding: 20px 0 80px;
}

.pd-hero {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 60px;
  align-items: start;
  margin-bottom: 80px;
}
@media (max-width: 968px) {
  .pd-hero { grid-template-columns: 1fr; gap: 40px; }
}

/* Gallery */
.pd-gallery {
  position: sticky;
  top: 100px;
}
.pd-main-media {
  aspect-ratio: 1;
  border-radius: var(--r-2xl);
  background:
    radial-gradient(circle at 70% 20%, rgba(0, 212, 255, 0.12), transparent 55%),
    linear-gradient(180deg, #f8faff 0%, #e2e7ff 100%);
  border: 1px solid var(--outline-variant);
  position: relative;
  overflow: hidden;
  display: grid;
  place-items: center;
}
.pd-main-media::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
}
.pd-main-media > svg { width: 60%; height: 60%; z-index: 1; animation: floaty 6s ease-in-out infinite; }
.pd-main-media .corner-tl,
.pd-main-media .corner-br {
  position: absolute;
  width: 20px; height: 20px;
  border: 2px solid var(--accent);
  opacity: 0.5;
}
.pd-main-media .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
.pd-main-media .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

.pd-media-tag {
  position: absolute;
  top: 20px;
  right: 20px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border: 1px solid var(--outline-variant);
  border-radius: var(--r-full);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 2;
}
.pd-media-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }

.pd-thumbs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 14px;
}
.pd-thumb {
  aspect-ratio: 1;
  border-radius: var(--r-md);
  background: linear-gradient(135deg, #f2f3ff, #e2e7ff);
  border: 1px solid var(--outline-variant);
  cursor: pointer;
  transition: all 0.2s;
  display: grid;
  place-items: center;
  position: relative;
}
.pd-thumb.active { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15); }
.pd-thumb:hover { border-color: var(--primary); }
.pd-thumb svg { width: 60%; height: 60%; opacity: 0.7; }
.pd-thumb.active svg { opacity: 1; }
.pd-thumb .n {
  position: absolute; top: 4px; left: 6px;
  font-size: 9px; font-weight: 600;
  color: var(--on-surface-muted);
  letter-spacing: 0.1em;
}

/* Info column */
.pd-info { padding-top: 8px; }
.pd-info .brand-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--outline-variant);
}
.pd-info .brand-mark {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.24em;
  color: var(--primary);
  padding: 6px 12px;
  background: rgba(0, 212, 255, 0.08);
  border: 1px solid rgba(0, 122, 153, 0.15);
  border-radius: var(--r-full);
}
.pd-info .brand-row .sku {
  font-size: 11px;
  color: var(--on-surface-muted);
  letter-spacing: 0.1em;
  font-variant-numeric: tabular-nums;
  margin-left: auto;
}

.pd-info h1 {
  font-size: 44px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin-bottom: 12px;
}
@media (max-width: 768px) { .pd-info h1 { font-size: 32px; } }

.pd-info .tagline {
  font-size: 15px;
  color: var(--on-surface-variant);
  margin-bottom: 24px;
}

.pd-rating {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}
.pd-rating .stars { display: flex; gap: 2px; color: #f59e0b; }
.pd-rating .stars svg { width: 16px; height: 16px; }
.pd-rating .txt {
  font-size: 13px;
  color: var(--on-surface-variant);
}
.pd-rating .txt strong { color: var(--navy); font-weight: 600; }

.pd-price-card {
  padding: 24px;
  background: white;
  border: 1px solid var(--outline-variant);
  border-radius: var(--r-xl);
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.pd-price-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 60%; height: 3px;
  background: linear-gradient(90deg, var(--accent), transparent);
}
.pd-price-row {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 12px;
}
.pd-price {
  font-size: 40px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.03em;
  line-height: 1;
}
.pd-price .currency {
  font-size: 20px;
  color: var(--navy);
  margin-right: 4px;
}
.pd-installment {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--r-full);
  background: rgba(16, 185, 129, 0.1);
  color: #059669;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  border: 1px solid rgba(16, 185, 129, 0.25);
}
.pd-stock {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--navy);
  font-weight: 500;
}
.pd-stock .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #10b981;
  box-shadow: 0 0 8px #10b981;
  animation: pulse 2s ease-in-out infinite;
}
.pd-stock .n { color: var(--on-surface-muted); font-weight: 400; }

/* Qty + CTA */
.pd-cta {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  margin-bottom: 32px;
  align-items: stretch;
}
@media (max-width: 560px) { .pd-cta { grid-template-columns: 1fr; } }

.qty {
  display: flex;
  align-items: center;
  padding: 4px;
  background: var(--surface-container-low);
  border-radius: var(--r-full);
  border: 1px solid var(--outline-variant);
}
.qty button {
  width: 36px; height: 36px;
  border-radius: var(--r-full);
  display: grid; place-items: center;
  color: var(--navy);
  transition: all 0.15s;
}
.qty button:hover { background: white; color: var(--primary); }
.qty .n {
  min-width: 40px;
  text-align: center;
  font-weight: 600;
  color: var(--navy);
  font-variant-numeric: tabular-nums;
}

.wishlist-btn {
  width: 52px; height: 52px;
  border-radius: var(--r-full);
  background: white;
  border: 1px solid var(--outline-variant);
  color: var(--navy);
  display: grid; place-items: center;
  transition: all 0.2s;
}
.wishlist-btn:hover {
  border-color: var(--error);
  color: var(--error);
  background: #fef2f2;
}

/* Trust badges */
.pd-trust {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding-top: 24px;
  border-top: 1px solid var(--outline-variant);
}
.trust {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  padding: 12px 14px;
  background: var(--surface-container-low);
  border-radius: var(--r-md);
  transition: all 0.2s;
}
.trust:hover { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.trust .ico { color: var(--primary); }
.trust .l { font-size: 11px; font-weight: 600; color: var(--navy); }
.trust .s { font-size: 10px; color: var(--on-surface-muted); }

/* SPEC PANEL */
.spec-section {
  margin-top: 60px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}
@media (max-width: 968px) {
  .spec-section { grid-template-columns: 1fr; }
}

.spec-card {
  background: var(--navy);
  color: white;
  padding: 40px;
  border-radius: var(--r-xl);
  position: relative;
  overflow: hidden;
}
.spec-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(500px 300px at 100% 0%, rgba(0, 212, 255, 0.12), transparent 60%),
    radial-gradient(400px 200px at 0% 100%, rgba(0, 122, 153, 0.15), transparent 60%);
}
.spec-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 24px 24px;
  mask-image: radial-gradient(circle at 30% 30%, black, transparent 80%);
}
.spec-card > * { position: relative; z-index: 1; }
.spec-card h3 {
  font-size: 22px;
  font-weight: 600;
  color: white;
  margin-bottom: 8px;
}
.spec-card .eyebrow { color: var(--accent); margin-bottom: 6px; }
.spec-card .sub {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 32px;
}

.spec-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.spec-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  align-items: center;
}
.spec-row:last-child { border-bottom: none; }
.spec-row .k {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
.spec-row .v {
  font-size: 14px;
  font-weight: 500;
  color: white;
  font-variant-numeric: tabular-nums;
}

.desc-card {
  padding: 40px;
  background: white;
  border: 1px solid var(--outline-variant);
  border-radius: var(--r-xl);
}
.desc-card h3 { font-size: 22px; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
.desc-card .eyebrow { margin-bottom: 6px; }
.desc-card p {
  font-size: 15px;
  line-height: 26px;
  color: var(--on-surface-variant);
  margin-bottom: 24px;
}
.feature-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 20px;
}
.feature-grid .f {
  padding: 14px;
  background: var(--surface-container-low);
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  gap: 10px;
}
.feature-grid .f .ico {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: white;
  border: 1px solid var(--outline-variant);
  display: grid; place-items: center;
  color: var(--primary);
  flex-shrink: 0;
}
.feature-grid .f .t {
  font-size: 12px;
  font-weight: 500;
  color: var(--navy);
  line-height: 16px;
}

/* Related */
.related-section { margin-top: 80px; }
.related-header {
  display: flex;
  justify-content: space-between;
  align-items: end;
  margin-bottom: 32px;
}
.related-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
@media (max-width: 900px) { .related-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .related-grid { grid-template-columns: 1fr; } }

.product-card {
  background: white;
  border: 1px solid var(--outline-variant);
  border-radius: var(--r-xl);
  overflow: hidden;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  display: flex;
  flex-direction: column;
}
.product-card:hover {
  border-color: rgba(0, 122, 153, 0.3);
  transform: translateY(-4px);
  box-shadow: 0 20px 50px -20px rgba(15, 23, 42, 0.15);
}
.product-card .media {
  aspect-ratio: 1.05;
  background: linear-gradient(180deg, #f8faff 0%, #eef2ff 100%);
  position: relative; display: grid; place-items: center; overflow: hidden;
}
.product-card .media svg { width: 55%; height: 55%; }
.product-card .badge-wrap { position: absolute; top: 14px; left: 14px; }
.product-card .info { padding: 20px; }
.product-card .brand { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--primary); margin-bottom: 6px; }
.product-card h3 { font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 12px; }
.product-card .price-row { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--outline-variant); }
.product-card .price { font-size: 16px; font-weight: 700; color: var(--navy); }

/* Mobile menu */
.mobile-menu {
  display: none;
  position: absolute;
  top: 100%; left: 20px; right: 20px;
  margin-top: 8px;
  background: white; border: 1px solid var(--outline-variant);
  border-radius: var(--r-lg); padding: 12px;
  box-shadow: var(--shadow-elev);
}
.mobile-menu.open { display: flex; flex-direction: column; gap: 4px; }
.mobile-menu-link { padding: 12px 16px; border-radius: var(--r-md); font-size: 14px; font-weight: 500; color: var(--navy); }
</style>
</head>
<body data-screen-label="Product Detail">

<div id="nav-slot"></div>

<main>
  <div class="container">
    <div class="breadcrumb" id="crumb"></div>
  </div>

  <section class="product-page">
    <div class="container">
      <div class="pd-hero">
        <!-- Gallery -->
        <div class="pd-gallery">
          <div class="pd-main-media">
            <span class="corner-tl"></span>
            <span class="corner-br"></span>
            <div class="pd-media-tag"><span class="dot"></span>Studio · 360°</div>
            <div id="main-mark"></div>
          </div>
          <div class="pd-thumbs" id="thumbs"></div>
        </div>

        <!-- Info -->
        <div class="pd-info" id="pd-info"></div>
      </div>

      <!-- Specs + Description -->
      <div class="spec-section">
        <div class="spec-card">
          <span class="eyebrow">Technical Readout</span>
          <h3>Specifications</h3>
          <p class="sub">All measurements verified per manufacturer QA batch.</p>
          <div class="spec-list" id="spec-list"></div>
        </div>

        <div class="desc-card">
          <span class="eyebrow">About</span>
          <h3>What's in the box</h3>
          <p id="pd-desc"></p>
          <div class="feature-grid">
            <div class="f">
              <span class="ico"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 2L4 5v5c0 4 6 8 6 8s6-4 6-8V5l-6-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span class="t">18-month warranty</span>
            </div>
            <div class="f">
              <span class="ico"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="2" y="6" width="12" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M14 8l4-2v11l-4-2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
              <span class="t">Free shipping over EGP 5,000</span>
            </div>
            <div class="f">
              <span class="ico"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 2C5.6 2 2 5.6 2 10s3.6 8 8 8 8-3.6 8-8M14 6l4-4M18 2v4h-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span class="t">14-day return policy</span>
            </div>
            <div class="f">
              <span class="ico"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M2 8h16M4 4h12v12H4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
              <span class="t">0% installments up to 12mo</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Related -->
      <div class="related-section">
        <div class="related-header">
          <div>
            <span class="eyebrow">You might also like</span>
            <h2 class="headline-md" style="margin-top:12px">Related products</h2>
          </div>
          <a href="products.html" class="btn btn-ghost btn-sm">View all →</a>
        </div>
        <div class="related-grid" id="related-grid"></div>
      </div>
    </div>
  </section>
</main>

<div id="footer-slot"></div>

<script src="app.js"></script>
<script>
  mountShell('products');

  const id = new URLSearchParams(location.search).get('id') || 'f40';
  const p = PRODUCTS.find(x => x.id === id) || PRODUCTS[0];
  let qty = 1;

  document.title = `${p.name} · Uni-Shop`;

  // Breadcrumb
  document.getElementById('crumb').innerHTML = `
    <a href="index.html">Home</a>
    <span class="sep">/</span>
    <a href="products.html">Products</a>
    <span class="sep">/</span>
    <a href="products.html?brand=${p.brand}">${p.brand}</a>
    <span class="sep">/</span>
    <span class="current">${p.name}</span>
  `;

  // Main media
  document.getElementById('main-mark').innerHTML = productMark(p, 320);

  // Thumbs — same mark, different angles/tints for variety
  document.getElementById('thumbs').innerHTML = [1,2,3,4].map((n, i) => `
    <div class="pd-thumb ${i===0?'active':''}">
      <span class="n">0${n}</span>
      ${productMark(p, 60)}
    </div>
  `).join('');
  document.querySelectorAll('.pd-thumb').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.pd-thumb').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
    });
  });

  // Info
  document.getElementById('pd-info').innerHTML = `
    <div class="brand-row">
      <span class="brand-mark">${p.brand.toUpperCase()}</span>
      ${p.badge ? `<span class="badge badge-${p.badge.kind}">${p.badge.label}</span>` : ''}
      <span class="sku">SKU · UNI-${p.id.toUpperCase()}-01</span>
    </div>
    <h1>${p.name}</h1>
    <p class="tagline">${p.tagline}</p>

    <div class="pd-rating">
      <div class="stars">
        ${[1,2,3,4,5].map(() => `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l2.2 4.5 5 .7-3.6 3.5.8 5L8 12.5 3.6 14.7l.8-5L.8 6.2l5-.7L8 1z"/></svg>`).join('')}
      </div>
      <span class="txt"><strong>4.9</strong> · Based on 247 verified reviews</span>
    </div>

    <div class="pd-price-card">
      <div class="pd-price-row">
        <div class="pd-price"><span class="currency">EGP</span>${p.price.toLocaleString('en-US')}</div>
        <span class="pd-installment">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          0% for 12 months
        </span>
      </div>
      <div class="pd-stock">
        <span class="dot"></span>
        In stock
        <span class="n">· Ships within 24h · Cairo warehouse</span>
      </div>
    </div>

    <div class="pd-cta">
      <div class="qty">
        <button onclick="setQty(qty-1)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        <span class="n" id="qty-n">1</span>
        <button onclick="setQty(qty+1)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>
      <button class="btn btn-primary btn-lg" onclick="handleAdd()" style="justify-content:center">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M5 6h11l-1 8H6L5 6zM5 6L4 3H2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="17" r="1.5" fill="currentColor"/><circle cx="14" cy="17" r="1.5" fill="currentColor"/></svg>
        Add to Cart · ${fmtPrice(p.price)}
      </button>
      <button class="wishlist-btn" onclick="showToast('Added to wishlist')" aria-label="Wishlist">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 17s-6-4-6-9a4 4 0 018-1 4 4 0 018 1c0 5-6 9-6 9z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="pd-trust">
      <div class="trust">
        <span class="ico"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2L4 5v4c0 4 6 8 6 8s6-4 6-8V5l-6-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
        <span class="l">Warranty</span>
        <span class="s">18 months certified</span>
      </div>
      <div class="trust">
        <span class="ico"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M2 12h11l3-3h-2l-2-2H2v5zM4 14a2 2 0 100-4 2 2 0 000 4zM13 14a2 2 0 100-4 2 2 0 000 4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
        <span class="l">Delivery</span>
        <span class="s">Free · 2-3 days</span>
      </div>
      <div class="trust">
        <span class="ico"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
        <span class="l">Support</span>
        <span class="s">24/7 hotline</span>
      </div>
    </div>
  `;

  // Specs
  document.getElementById('spec-list').innerHTML = p.specs.map(([k,v]) => `
    <div class="spec-row">
      <span class="k">${k}</span>
      <span class="v">${v}</span>
    </div>
  `).join('');

  document.getElementById('pd-desc').textContent = p.desc + ' Every unit is bench-tested and packed with charging cable, quick-start guide, and warranty card.';

  // Related — 3 other products
  const related = PRODUCTS.filter(x => x.id !== p.id).slice(0, 3);
  document.getElementById('related-grid').innerHTML = related.map(r => `
    <article class="product-card">
      <a href="product.html?id=${r.id}" style="display:block;color:inherit">
        <div class="media">
          ${r.badge ? `<div class="badge-wrap"><span class="badge badge-${r.badge.kind}">${r.badge.label}</span></div>` : ''}
          ${productMark(r, 200)}
        </div>
        <div class="info">
          <div class="brand">${r.brand.toUpperCase()}</div>
          <h3>${r.name}</h3>
          <div class="price-row">
            <span class="price">${fmtPrice(r.price)}</span>
            <span class="btn btn-dark btn-sm" style="pointer-events:none">Details →</span>
          </div>
        </div>
      </a>
    </article>
  `).join('');

  window.setQty = function(n) {
    qty = Math.max(1, Math.min(10, n));
    document.getElementById('qty-n').textContent = qty;
  };
  window.handleAdd = function() {
    addToCart(p.id, qty);
  };
</script>
</body>
</html>
