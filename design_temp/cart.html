<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart · Uni-Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.cart-page { padding: 20px 0 100px; }

.cart-header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.cart-header h1 {
  font-size: clamp(36px, 4vw, 48px);
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.03em;
  line-height: 1.05;
}
.cart-header .eyebrow { margin-bottom: 12px; }
.continue-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--primary);
}
.continue-link:hover { color: var(--primary-hover); }

.cart-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 32px;
  align-items: start;
}
@media (max-width: 968px) {
  .cart-layout { grid-template-columns: 1fr; }
}

/* Items */
.cart-items {
  background: white;
  border: 1px solid var(--outline-variant);
  border-radius: var(--r-xl);
  overflow: hidden;
}
.cart-items-head {
  display: grid;
  grid-template-columns: 1fr 100px 120px 40px;
  padding: 16px 24px;
  background: var(--surface-container-low);
  border-bottom: 1px solid var(--outline-variant);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--on-surface-muted);
  gap: 20px;
}
@media (max-width: 560px) {
  .cart-items-head { display: none; }
}
.cart-items-head .col-price,
.cart-items-head .col-qty { text-align: right; }
.cart-items-head .col-qty { text-align: center; }

.cart-row {
  display: grid;
  grid-template-columns: 1fr 100px 120px 40px;
  padding: 20px 24px;
  gap: 20px;
  align-items: center;
  border-bottom: 1px solid var(--outline-variant);
  transition: background 0.2s;
}
.cart-row:last-child { border-bottom: none; }
.cart-row:hover { background: var(--surface-container-low); }
@media (max-width: 560px) {
  .cart-row { grid-template-columns: 80px 1fr; grid-template-rows: auto auto auto; }
  .cart-row .col-item { grid-column: 2; grid-row: 1; }
  .cart-row .cart-thumb { grid-column: 1; grid-row: 1 / 4; }
  .cart-row .col-price { grid-column: 2; grid-row: 3; text-align: left; }
  .cart-row .col-qty { grid-column: 2; grid-row: 2; text-align: left; justify-content: flex-start; }
  .cart-row .col-remove { position: absolute; top: 20px; right: 20px; }
}

.col-item { display: flex; gap: 16px; align-items: center; }
.cart-thumb {
  width: 72px; height: 72px;
  border-radius: var(--r-md);
  background: linear-gradient(135deg, #f2f3ff, #e2e7ff);
  display: grid; place-items: center;
  border: 1px solid var(--outline-variant);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.cart-thumb svg { width: 70%; height: 70%; }

.cart-item-info .brand {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--primary);
  margin-bottom: 4px;
}
.cart-item-info h4 {
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 4px;
}
.cart-item-info .tag {
  font-size: 11px;
  color: var(--on-surface-muted);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.cart-item-info .tag .dot {
  width: 6px; height: 6px; border-radius: 50%; background: #10b981;
}

.qty-mini {
  display: inline-flex;
  align-items: center;
  padding: 3px;
  background: var(--surface-container-low);
  border-radius: var(--r-full);
  border: 1px solid var(--outline-variant);
}
.col-qty { display: flex; justify-content: center; }
.qty-mini button {
  width: 28px; height: 28px;
  border-radius: var(--r-full);
  display: grid; place-items: center;
  color: var(--navy);
  transition: all 0.15s;
}
.qty-mini button:hover { background: white; color: var(--primary); }
.qty-mini .n {
  min-width: 28px;
  text-align: center;
  font-weight: 600;
  font-size: 13px;
  color: var(--navy);
  font-variant-numeric: tabular-nums;
}

.col-price {
  text-align: right;
  font-size: 16px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.01em;
}
.col-price .unit {
  display: block;
  font-size: 11px;
  color: var(--on-surface-muted);
  font-weight: 400;
  margin-top: 2px;
}

.remove-btn {
  width: 32px; height: 32px;
  border-radius: var(--r-full);
  display: grid; place-items: center;
  color: var(--on-surface-muted);
  transition: all 0.15s;
}
.remove-btn:hover {
  background: #fef2f2;
  color: var(--error);
}

.cart-items-foot {
  padding: 16px 24px;
  background: var(--surface-container-low);
  border-top: 1px solid var(--outline-variant);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.clear-cart {
  font-size: 12px;
  color: var(--on-surface-muted);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.clear-cart:hover { color: var(--error); }
.items-total {
  font-size: 12px;
  color: var(--on-surface-muted);
  letter-spacing: 0.05em;
}
.items-total strong { color: var(--navy); font-weight: 600; }

/* Empty state */
.cart-empty {
  padding: 100px 40px;
  text-align: center;
  background: white;
  border: 1px solid var(--outline-variant);
  border-radius: var(--r-xl);
}
.cart-empty-icon {
  width: 96px; height: 96px;
  border-radius: 50%;
  background: var(--surface-container-low);
  display: grid; place-items: center;
  margin: 0 auto 24px;
  color: var(--primary);
  position: relative;
}
.cart-empty-icon::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 1px dashed rgba(0, 122, 153, 0.3);
}
.cart-empty h3 {
  font-size: 22px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 8px;
}
.cart-empty p {
  font-size: 14px;
  color: var(--on-surface-muted);
  margin-bottom: 28px;
  max-width: 360px;
  margin-left: auto;
  margin-right: auto;
}

/* Summary */
.summary {
  position: sticky;
  top: 100px;
}
.summary-card {
  padding: 28px;
  background: white;
  border: 1px solid var(--outline-variant);
  border-radius: var(--r-xl);
  overflow: hidden;
  position: relative;
}
.summary-card::before {
  content: '';
  position: absolute;
  top: 0; left: 24px; right: 24px;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
}
.summary-card h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 4px;
}
.summary-card .sub {
  font-size: 12px;
  color: var(--on-surface-muted);
  margin-bottom: 24px;
}

.promo-input {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}
.promo-input input {
  flex: 1;
  padding: 12px 14px;
  background: var(--surface-container-low);
  border: 1px solid transparent;
  border-radius: var(--r-full);
  font-size: 13px;
  color: var(--navy);
}
.promo-input input:focus {
  outline: none;
  background: white;
  border-color: var(--accent);
}
.promo-input button {
  padding: 12px 20px;
  background: var(--navy);
  color: white;
  border-radius: var(--r-full);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}
.promo-input button:hover { background: var(--navy-2); }

.summary-rows { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: var(--on-surface-variant);
}
.summary-row .v {
  font-weight: 500;
  color: var(--navy);
  font-variant-numeric: tabular-nums;
}
.summary-row .v.free { color: #059669; font-weight: 600; }

.summary-total {
  padding: 20px 0;
  border-top: 1px solid var(--outline-variant);
  border-bottom: 1px solid var(--outline-variant);
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.summary-total .l {
  font-size: 14px;
  font-weight: 500;
  color: var(--navy);
}
.summary-total .v {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}

.checkout-btn {
  width: 100%;
  padding: 18px;
  background: var(--primary);
  color: white;
  border-radius: var(--r-full);
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.25s;
  box-shadow: 0 4px 20px -4px rgba(0, 122, 153, 0.4);
  position: relative;
  overflow: hidden;
}
.checkout-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(0, 212, 255, 0.3) 100%);
  opacity: 0;
  transition: opacity 0.3s;
}
.checkout-btn:hover::before { opacity: 1; }
.checkout-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px -4px rgba(0, 122, 153, 0.5), 0 0 0 4px rgba(0, 212, 255, 0.15); }
.checkout-btn > * { position: relative; z-index: 1; }

.summary-trust {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px dashed var(--outline-variant);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.trust-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--on-surface-muted);
}
.trust-item .ico {
  color: var(--primary);
  flex-shrink: 0;
}

.payment-methods {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--outline-variant);
}
.pm-label {
  font-size: 10px;
  color: var(--on-surface-muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.pm-icons { display: flex; gap: 6px; }
.pm-icons .pm {
  padding: 4px 8px;
  border-radius: 4px;
  background: var(--surface-container-low);
  border: 1px solid var(--outline-variant);
  font-size: 9px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: 0.05em;
}

/* Mobile menu */
.mobile-menu { display: none; position: absolute; top: 100%; left: 20px; right: 20px; margin-top: 8px; background: white; border: 1px solid var(--outline-variant); border-radius: var(--r-lg); padding: 12px; box-shadow: var(--shadow-elev); }
.mobile-menu.open { display: flex; flex-direction: column; gap: 4px; }
.mobile-menu-link { padding: 12px 16px; border-radius: var(--r-md); font-size: 14px; font-weight: 500; color: var(--navy); }
</style>
</head>
<body data-screen-label="Cart">

<div id="nav-slot"></div>

<main>
  <div class="container">
    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep">/</span>
      <span class="current">Shopping Cart</span>
    </div>
  </div>

  <section class="cart-page">
    <div class="container">
      <div class="cart-header">
        <div>
          <span class="eyebrow">Order · Draft</span>
          <h1>Shopping Cart</h1>
        </div>
        <a href="products.html" class="continue-link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M12 8H4M8 4L4 8l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Continue Shopping
        </a>
      </div>

      <div id="cart-content"></div>
    </div>
  </section>
</main>

<div id="footer-slot"></div>

<script src="app.js"></script>
<script>
  mountShell();

  function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cart-content');

    if (!cart.length) {
      container.innerHTML = `
        <div class="cart-empty">
          <div class="cart-empty-icon">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none"><path d="M6 6h15l-1.5 9h-11L6 6zM6 6L5 3H2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="20" r="1.5" fill="currentColor"/><circle cx="18" cy="20" r="1.5" fill="currentColor"/></svg>
          </div>
          <h3>Your cart is empty</h3>
          <p>Looks like you haven't added any products yet. Explore our catalog to find your next favorite piece of tech.</p>
          <a href="products.html" class="btn btn-primary btn-lg">
            Browse Products
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 8h8M8 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
        </div>`;
      return;
    }

    const total = cartTotal();
    const shipping = total >= 5000 ? 0 : 80;
    const grand = total + shipping;

    container.innerHTML = `
      <div class="cart-layout">
        <div>
          <div class="cart-items">
            <div class="cart-items-head">
              <span>Product</span>
              <span class="col-qty">Qty</span>
              <span class="col-price">Price</span>
              <span></span>
            </div>
            ${cart.map(item => {
              const p = PRODUCTS.find(x => x.id === item.id);
              if (!p) return '';
              return `
                <div class="cart-row">
                  <div class="col-item">
                    <div class="cart-thumb">${productMark(p, 60)}</div>
                    <div class="cart-item-info">
                      <div class="brand">${p.brand.toUpperCase()}</div>
                      <h4>${p.name}</h4>
                      <span class="tag"><span class="dot"></span>In stock · SKU ${p.id.toUpperCase()}</span>
                    </div>
                  </div>
                  <div class="col-qty">
                    <div class="qty-mini">
                      <button onclick="updateCartItem('${p.id}', ${item.qty-1})"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
                      <span class="n">${item.qty}</span>
                      <button onclick="updateCartItem('${p.id}', ${item.qty+1})"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
                    </div>
                  </div>
                  <div class="col-price">
                    ${fmtPrice(p.price * item.qty)}
                    ${item.qty > 1 ? `<span class="unit">${fmtPrice(p.price)} each</span>` : ''}
                  </div>
                  <button class="remove-btn" onclick="removeFromCart('${p.id}')" aria-label="Remove">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V2h4v2M5 4l1 10h4l1-10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                </div>
              `;
            }).join('')}
            <div class="cart-items-foot">
              <span class="clear-cart" onclick="if(confirm('Clear all items?')) clearCart()">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V2h4v2M5 4l1 10h4l1-10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Clear cart
              </span>
              <span class="items-total"><strong>${cartCount()}</strong> item${cartCount()>1?'s':''} · Subtotal <strong>${fmtPrice(total)}</strong></span>
            </div>
          </div>
        </div>

        <div class="summary">
          <div class="summary-card">
            <h3>Order Summary</h3>
            <p class="sub">Live totals — updates automatically.</p>

            <div class="promo-input">
              <input type="text" placeholder="Promo code" />
              <button onclick="showToast('Promo code applied')">Apply</button>
            </div>

            <div class="summary-rows">
              <div class="summary-row">
                <span>Subtotal · ${cartCount()} item${cartCount()>1?'s':''}</span>
                <span class="v">${fmtPrice(total)}</span>
              </div>
              <div class="summary-row">
                <span>Shipping</span>
                <span class="v ${shipping===0?'free':''}">${shipping===0?'FREE':fmtPrice(shipping)}</span>
              </div>
              <div class="summary-row">
                <span>Tax (VAT)</span>
                <span class="v">Included</span>
              </div>
            </div>

            <div class="summary-total">
              <span class="l">Total</span>
              <span class="v">${fmtPrice(grand)}</span>
            </div>

            <a href="checkout.html" class="checkout-btn">
              Proceed to Checkout
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>

            <div class="summary-trust">
              <div class="trust-item">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2L3 4v4c0 3 5 6 5 6s5-3 5-6V4L8 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
                <span>Secure checkout · SSL encrypted</span>
              </div>
              <div class="trust-item">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 10h9l3-3h-2l-2-2H2v5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
                <span>Free shipping over EGP 5,000</span>
              </div>
              <div class="trust-item">
                <span class="ico"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2C5 2 3 4 3 6v3H2v4h12V9h-1V6c0-2-2-4-5-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
                <span>14-day return guarantee</span>
              </div>
            </div>

            <div class="payment-methods">
              <span class="pm-label">Payments</span>
              <div class="pm-icons">
                <span class="pm">VISA</span>
                <span class="pm">MC</span>
                <span class="pm">CASH</span>
                <span class="pm">INSTA</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  renderCart();
  window.addEventListener('cart:change', renderCart);
</script>
</body>
</html>
